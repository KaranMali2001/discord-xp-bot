name: discord-xp-bot

# One `docker compose up --build` runs the whole stack: schema migration → api + bot →
# web dashboard. The database is Turso (libsql) — DATABASE_URL + DATABASE_AUTH_TOKEN come
# from .env, so api & bot share the same cloud DB (no local volume needed). Captured audio
# still uses a local named volume. Secrets come from .env (never baked into the image).

services:
  # One-shot: apply pending migrations to the Turso DB, then exit.
  migrate:
    build:
      context: .
      target: migrate
    command: pnpm --filter @xp/core db:migrate
    env_file: .env

  api:
    build:
      context: .
      target: server
    command: pnpm --filter @xp/api start
    env_file: .env
    environment:
      API_PORT: "8090"
      WEB_URL: ${WEB_URL:-http://localhost:5173}
    ports:
      - "8090:8090"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  bot:
    build:
      context: .
      target: server
    command: pnpm --filter @xp/bot start
    env_file: .env
    environment:
      # Transcript capture (Part 1). Off unless set true in .env. WAVs land on the
      # local `audio` volume so a separate Whisper worker can mount + read them.
      TRANSCRIPTS_ENABLED: ${TRANSCRIPTS_ENABLED:-false}
      AUDIO_ROOT: /data/audio
    volumes:
      - audio:/data/audio
    depends_on:
      migrate:
        condition: service_completed_successfully
    # Discord voice needs direct, bidirectional UDP. On a LINUX host, host networking
    # bypasses Docker's NAT — the usual cause of "voice never reaches Ready". (On macOS/
    # Windows Docker Desktop this has no effect; run the bot natively there for voice.)
    network_mode: host
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8090}
        VITE_DEFAULT_GUILD_ID: ${DISCORD_GUILD_ID:-}
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  # Captured utterance WAVs + sidecar JSON. Mount this read-only into the Whisper worker.
  audio:
